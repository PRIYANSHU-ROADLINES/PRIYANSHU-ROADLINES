<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIYANSHU ROADLINES </title>
<title>POD SYSTEM</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    color:red;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#cc0000;
}

#adminPanel{
    display:none;
}

img{
    max-width:100%;
    border-radius:10px;
}

.status{
    padding:5px 10px;
    border-radius:5px;
    color:white;
}

.pending{
    background:orange;
}

.delivered{
    background:blue;
}

.completed{
    background:green;
}
#watermark{

position:fixed;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

width:700px;

height:700px;

background-image:
url("images/logo.png");

background-size:contain;

background-repeat:no-repeat;

opacity:0.5;

pointer-events:none;

z-index:-1;
body *{
position:relative;
z-index:0;
}

}
</style>
</head>

<body>

<header>
<div class="logo-box">
    <img src="images/logo.png" alt="PRIYANSHU ROADLINES Logo" class="logo-img">
</div>
<h1>PRIYANSHU ROADLINES POD SYSTEM</h1>
</header>

<div class="container">

<!-- PUBLIC SEARCH -->

<div class="card" id="searchPanel" style="display:none;">
<h2>Search POD</h2>

<input
type="text"
id="searchGR"
placeholder="Enter GR Number"
onkeypress="handleSearchEnter(event)">

<button onclick="SearchPod()">🔍 Search</button>

<div id="result"></div>

</div>

<!-- LOGIN -->

<div class="card" id="loginBox">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" style="display:none;">
<div class="card">

<h2>Dashboard</h2>

<p>Total PODs: <b id="totalPods">0</b></p>

<p>Completed: <b id="completedPods">0</b></p>

<p>Pending: <b id="pendingPods">0</b></p>

<p>Delivered: <b id="deliveredPods">0</b></p>
<br>

<button onclick="downloadExcel()">
Download POD Report
</button>
</div>
<div class="card">

<h2>Upload POD</h2>

<input type="text" id="grNo" placeholder="GR Number *" required>

<input type="text" id="vehicleNo" placeholder="Vehicle Number">

<input type="text" id="driverName" placeholder="Driver Name">

<input type="text" id="driverMobile" placeholder="Driver Mobile">

<input type="text" id="partyName" placeholder="Party Name">

<input type="date" id="deliveryDate">

<textarea id="remarks" placeholder="Remarks"></textarea>

<select id="status">
<option value="Completed">Completed</option>
<option value="Pending">Pending</option>
<option value="Delivered">Delivered</option>
</select>

<input type="file" id="podImage">

<button onclick="uploadPOD()">Save POD</button>

<button onclick="logout()">Logout</button>

</div>

<div class="card">

<h2>Recent PODs</h2>
<button onclick="toggleRecentPods()">
📦 Recent PODs
</button>

<div id="recentPods" style="display:none;">
</div>

<div id="loginHistorySection" style="display:none;">

  <h3>Recent Login Activity</h3>
    <button onclick="deleteAllLoginHistory()">
Delete All History
</button>

  <button onclick="toggleLoginHistory()">
📜 Login History
</button>

<div
id="loginHistoryBox"
style="display:none;">
</div>
<div id="deviceApprovalSection" style="display:none;">

  <h3>Pending Device Requests</h3>

  <button onclick="togglePendingDevices()">
📱 Pending Devices
</button>

<div
id="pendingDevicesBox"
style="display:none;">
</div>
 
    <div id="trustedDevicesSection" style="display:none;">

  <h3>Trusted Devices</h3>
<button onclick="toggleTrustedDevices()">
🔐 Trusted Devices
</button>

<div
id="trustedDevicesBox"
style="display:none;">
</div>
  
<div id="watermark"></div>

<script type="module" src="pod.js"></script>

</body>
</html>
